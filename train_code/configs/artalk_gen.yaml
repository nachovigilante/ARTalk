PIPELINE: 'ar_trainer.ARTrainer'
WANDB_ENTITY: 'xchu_ut'
WANDB_PROJECT: 'UniLS'
DUMP_DIR: './outputs'


DATASET:
  NAME: 'ARTalkData'
  LOADER: 'artalk_data.ARTalkData'
  CLIP_LENGTH: 100
  PREV_LENGTH: 100
  STYLE_LENGTH: 100
  MOTION_FPS: 25
  AUDIO_SAMPLE_RATE: 16000
  DATA_PATH: '/home/mil/x-chu/workspace/Data_umiushi/ARTalk/TKH1K/data_lmdb'
  META_PATH: '/home/mil/x-chu/workspace/Data_umiushi/ARTalk/TKH1K/metadata.json'


MODEL:
  NAME: 'ARTalkGen'
  LOADER: 'artalk_gen.ARTalkGen'
  AUDIO_ENCODER: 'wav2vec'
  T_DEPTH: 8
  T_NUM_HEAD: 8
  T_EMBED_DIM: 512
  
  FLIP_QUANT: 0.3
  PREV_FREE: 0.1
  AUDIO_FREE: 0.1
  STYLE_FREE: 0.1

  PRETRAIN_PATH: null

  VAE_CONFIG:
    LOADER: 'artalk_codec.ARTalkCodec'
    MOTION_DIM: 108 # 100 + 3 + 1 + 2 + 2
    V_CODE_DIM: 32
    V_PATCH_NUMS: [1, 10, 20, 50, 100]
    T_DEPTH: 8
    T_NUM_HEADS: 8
    T_HIDDEN_DIM: 512
    STATS_PATH: '/home/mil/x-chu/workspace/Data_umiushi/ARTalk/TKH1K/metadata_stats.json'
    VAE_PATH: '/home/mil/x-chu/workspace/ARTalk/outputs/ARTalkCodec_ARTalkData/Mar01_0027_qrmvb/checkpoints/iter_50000.pt'
    

TRAINER:
  # TRAIN LOOP
  BATCH_SIZE: 128
  TRAIN_ITER: 200000
  CHECK_INTERVAL: 20000

  # OPTIMIZER
  NAME: 'Adam'
  WARMUP_ITER: 1000
  LR_DECAY_RATE: 0.1
  LR_DECAY_ITER: 200000
  LEARNING_RATE: 1.0e-4

  # EMA
  USING_EMA: True
  EMA_DECAY: 0.9999
  EMA_UPDATE_FREQ: 1


LOSS_KWARGS:
  CE_WEIGHT: 1.0